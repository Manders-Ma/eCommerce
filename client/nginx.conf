server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # /api/* → 反向代理到 Gateway 容器，proxy_pass 結尾的 / 會去掉 /api 前綴
    # 例：GET /api/products → GET http://gateway:8080/products
    # 由於前端與 API 同源（皆 localhost:4200），瀏覽器不會觸發 CORS 預檢。
    location /api/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;
    }

    # Angular SPA fallback：找不到實體檔案時回傳 index.html，交給前端路由處理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源長期快取（Angular production 檔名含 hash，內容不變）
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
