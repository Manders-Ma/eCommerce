server.port=8080
spring.application.name=Gateway

management.endpoints.web.exposure.include=gateway

logging.level.org.springframework.cloud.gateway=DEBUG

eureka.client.service-url.defaultZone=http://localhost:8010/eureka/

# Discovery Locator 保留作 fallback（用 /productservice/... 也能打）
#spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
#spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# 載入 env.properties (含 GATEWAY_INTERNAL_JWT_SECRET)
spring.config.import=optional:file:./src/main/resources/env.properties,optional:classpath:env.properties

# ── Internal JWT (簽發給下游服務的短期憑證) ─────────────────────────────────
gateway.internal.jwt.secret=${GATEWAY_INTERNAL_JWT_SECRET}
gateway.internal.jwt.ttl-seconds=60

# ── ProductService Routes (外部公開) ──────────────────────────────────────
# 暴露 /products/**, /product-category/**, /inventory/**
# 備註：/inventory/** 非 reserve 端點需 ADMIN role，由 ProductService 自行把關
spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ProductService
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/products/**,/product-category/**,/inventory/**
# DedupeResponseHeader：移除 downstream 回傳的重複 CORS header，保留 Gateway 加的那個
# 原因：ProductService 自身有 CORS config，Gateway 也會加，兩個同名 header 會讓瀏覽器報錯
spring.cloud.gateway.server.webflux.routes[0].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── OrderService Routes (外部公開) ────────────────────────────────────────
# 暴露 /member/**, /checkout/**, /pay/**, /order-history, /shipping-address/**
spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://OrderService
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/member/**,/checkout/**,/pay/**,/order-history,/shipping-address/**
# 同上，去除 OrderService 回傳的重複 CORS header
spring.cloud.gateway.server.webflux.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Internal Routes (服務間呼叫) ──────────────────────────────────────────
# 僅內部服務可呼叫；Gateway 透過 InternalAuth filter 簽發短期 JWT (X-Gateway-Auth)，
# 下游用相同 secret 驗章。OrderService → ProductService 預扣庫存走此路由。
spring.cloud.gateway.server.webflux.routes[2].id=internal-product-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ProductService
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/internal/inventory/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.server.webflux.routes[2].filters[1]=InternalAuth
